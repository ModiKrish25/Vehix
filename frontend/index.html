<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VehiX — Find Your Perfect Ride</title>
  <meta name="description"
    content="VehiX is India's premium vehicle marketplace. Rent, buy, and sell cars, motorcycles, scooters and EVs." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;700;900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- UnicornStudio ambient engine for animated background effects -->
  <script type="text/javascript">
    !function () {
      var u = window.UnicornStudio;
      if (u && u.init) {
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", function () { u.init() })
        } else { u.init() }
      } else {
        window.UnicornStudio = { isInitialized: !1 };
        var i = document.createElement("script");
        i.src = "https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.0.5/dist/unicornStudio.umd.js";
        i.onload = function () {
          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", function () { UnicornStudio.init() })
          } else { UnicornStudio.init() }
        };
        (document.head || document.body).appendChild(i)
      }
    }();
  </script>
</body>

</html>
